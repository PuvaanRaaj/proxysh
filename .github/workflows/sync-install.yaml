name: Sync install.sh

on:
  push:
    branches:
      - main
    paths:
      - install.sh

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy install.sh to docs/
        run: cp install.sh docs/install.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/install.sh
          git diff --cached --quiet || git commit -m "chore: sync install.sh to docs [skip ci]"
          git push
